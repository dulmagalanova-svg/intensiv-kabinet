<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Материалы — Кабинет интенсива</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .lessons .sec{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#9c7a00;margin:22px 4px 10px}
  .lessons .sec:first-of-type{margin-top:8px}
  .lessons .lcard.locked{opacity:.62;cursor:default}
  .lessons .lcard.locked .num{filter:grayscale(1)}
  .lessons .lockd{font-size:13px;font-weight:700;color:#9c7a00;margin-top:2px}
</style>
</head>
<body>

<div id="nav"></div>

<main class="wrap lessons">
  <h2 style="margin-bottom:4px">Материалы</h2>
  <p class="lead">Уроки интенсива. Открывай по очереди, отмечай пройденное галочкой — прогресс сохраняется.</p>

  <div id="list"><div class="center">Загружаю…</div></div>
</main>

<footer>Интенсив «AI-команда на Claude» · кабинет</footer>

<script type="module">
import { supabase } from '/js/supabase-client.js'
import { requireAuth, currentUser } from '/js/auth.js'
import { renderNav } from '/js/nav.js'

const PAYFORM = 'https://payform.ru/mrbKtEd/'

const session = await requireAuth()
if(session){
  renderNav('materialy')
  renderLessons()
}

async function renderLessons(){
  const list = document.getElementById('list')

  // админ (Mrs) видит закрытые уроки для предпросмотра; ученики — нет
  const me = await currentUser()
  const { data: meProf } = await supabase.from('profiles').select('is_admin').eq('id', me.id).maybeSingle()
  const isAdmin = !!(meProf && meProf.is_admin)

  // RLS вернёт уроки только оплаченному. Пусто → либо не оплачен, либо нет уроков.
  const { data: lessons, error } = await supabase
    .from('lessons').select('id,slug,title,day,sort,unlock_at').order('sort')

  if(error){ list.innerHTML = `<div class="locked">Ошибка загрузки: ${error.message}</div>`; return }

  if(!lessons || lessons.length === 0){
    const user = await currentUser()
    const payUrl = PAYFORM + '?customer_email=' + encodeURIComponent(user?.email || '')
    list.innerHTML = `<div class="locked">
      <b>Доступ к урокам закрыт.</b><br>
      Оформи доступ к интенсиву — уроки откроются автоматически после оплаты.
      <div style="margin-top:14px">
        <a class="btn" style="display:inline-block;max-width:280px;text-decoration:none;text-align:center" href="${payUrl}" target="_blank" rel="noopener">Оплатить доступ</a>
      </div>
    </div>`
    return
  }

  const { data: prog } = await supabase.from('progress').select('lesson_id,done')
  const doneSet = new Set((prog || []).filter(p => p.done).map(p => p.lesson_id))

  const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря']
  const fmtDate = iso => { const d = new Date(iso); return d.getDate() + ' ' + MONTHS[d.getMonth()] }
  const isLocked = l => !isAdmin && l.unlock_at && new Date(l.unlock_at) > new Date()

  const card = (l, badge) => isLocked(l) ? `
    <div class="lcard locked">
      <span class="num">🔒</span>
      <span>
        <div class="t">${l.title}</div>
        <div class="lockd">Откроется ${fmtDate(l.unlock_at)}</div>
      </span>
      <span></span>
    </div>` : `
    <a class="lcard" href="/lesson.html?id=${l.id}">
      <span class="num">${badge}</span>
      <span>
        <div class="t">${l.title}</div>
      </span>
      <span class="done ${doneSet.has(l.id) ? 'on' : ''}">${doneSet.has(l.id) ? '✓' : ''}</span>
    </a>`

  // Предобучение — day=0; основные уроки — day>=1.
  const predob = lessons.filter(l => l.day === 0)
  const main = lessons.filter(l => l.day > 0)

  let html = ''
  if(predob.length){
    html += '<h3 class="sec">Предобучение</h3>'
    html += predob.map((l, i) => card(l, i + 1)).join('')
  }
  if(main.length){
    html += '<h3 class="sec">Уроки интенсива</h3>'
    html += main.map(l => card(l, l.day)).join('')
  }
  list.innerHTML = html
}
</script>
</body>
</html>
