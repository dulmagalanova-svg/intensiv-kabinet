<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Урок — Кабинет интенсива</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .lesson-body{padding:24px 0 8px;font-size:16px;color:#2a2620}
  .lesson-body h1{font-size:26px;margin:18px 0 8px}
  .lesson-body h2{font-size:20px;margin:22px 0 8px}
  .lesson-body h3{font-size:16.5px;margin:16px 0 6px;color:var(--golddark)}
  .lesson-body p{margin:8px 0}
  .lesson-body ul{padding-left:22px;margin:8px 0}
  .lesson-body li{margin:5px 0}
  .lesson-body a{color:var(--blue);font-weight:700}
  /* богатый контент урока */
  .lesson-body .goal{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
  .lesson-body .goal .g{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px}
  .lesson-body .goal .g .lab{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--golddark);margin-bottom:4px}
  .lesson-body .goal .g.res{background:linear-gradient(110deg,#fff8e8,#fffdf6);border-color:#f0dca0}
  .lesson-body .step{border:1.5px solid var(--line);border-radius:16px;overflow:hidden;margin:16px 0}
  .lesson-body .step .head{background:linear-gradient(165deg,#1c1810,#0d0d0d);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:11px}
  .lesson-body .step .head .n{flex:0 0 auto;width:29px;height:29px;border-radius:50%;background:linear-gradient(110deg,var(--gold2),var(--gold));color:#141414;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px}
  .lesson-body .step .head .t{font-weight:800;font-size:16px;color:#fff;margin:0}
  .lesson-body .step .body{padding:13px 16px}
  .lesson-body .why{font-size:14.5px;color:#5c564c;background:#f7f4ec;border-radius:8px;padding:8px 12px;margin:8px 0}
  .lesson-body .why b{color:var(--blue)}
  .lesson-body .see{font-size:14.5px;color:#1a4a82;background:#e7f0fb;border:1px solid #c5dcf5;border-radius:8px;padding:8px 12px;margin:8px 0}
  .lesson-body .say{background:var(--soft);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:9px 14px;margin:8px 0;font-size:14.5px;color:#2a2620}
  .lesson-body .say b{color:var(--golddark);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  .lesson-body .ok{color:var(--green);font-weight:700;display:block;margin-top:8px;font-size:14.5px}
  .lesson-body .big{background:linear-gradient(110deg,#fff8e8,#fffdf6);border:1.5px solid #f0dca0;border-radius:14px;padding:14px 18px;margin:14px 0;font-size:15.5px;color:#4a463d}
  .lesson-body .big b{color:var(--golddark)}
  .lesson-body .key{background:#e7f0fb;border:1px solid #c5dcf5;border-radius:12px;padding:13px 16px;margin:12px 0;font-size:15.5px;color:#1a4a82}
  .lesson-body .key b{color:#0d3a6b}
  .lesson-body .warn{background:#fff8e8;border:1px solid #f0dca0;border-left:4px solid #c98a0a;border-radius:8px;padding:10px 14px;margin:10px 0;font-size:14.5px;color:#7a5a12}
  .lesson-body .prompt{border:1.5px dashed #c5a23a;border-radius:14px;padding:2px 16px 12px;margin:14px 0;background:#fffdf6}
  .lesson-body .prompt .h{font-weight:800;color:var(--golddark);margin:12px 0 4px}
  .lesson-body .trouble{border:1.5px solid var(--line);border-radius:14px;padding:4px 16px 12px;margin:14px 0}
  .lesson-body .trouble .row{padding:10px 0;border-bottom:1px solid var(--line)}
  .lesson-body .trouble .row:last-child{border-bottom:none}
  .lesson-body .trouble .q{font-weight:800;font-size:15px}
  .lesson-body .trouble .a{font-size:14.5px;color:#3a3833;margin-top:3px}
  .lesson-body .tags{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}
  .lesson-body .tags span{font-size:12.5px;font-weight:700;color:var(--golddark);background:#fff3d4;border:1px solid #f0dca0;border-radius:999px;padding:4px 11px}
  .lesson-body .modes{border:1.5px solid var(--line);border-radius:14px;overflow:hidden;margin:12px 0}
  .lesson-body .modes .m{padding:11px 16px;border-bottom:1px solid var(--line)}
  .lesson-body .modes .m:last-child{border-bottom:none}
  .lesson-body .block{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin:12px 0}
  .lesson-body .block .bt{font-weight:800;font-size:16px;color:#141414;margin-bottom:2px}
  .lesson-body .block .bt span{display:inline-block;min-width:24px;height:24px;line-height:24px;text-align:center;border-radius:7px;background:linear-gradient(110deg,var(--gold2),var(--gold));color:#141414;font-size:13px;margin-right:8px}
  .lesson-body .block .what{font-size:15px;color:#2a2620;margin:6px 0}
  .lesson-body .block .zachem{font-size:14.5px;color:#1a4a82;background:#e7f0fb;border:1px solid #c5dcf5;border-radius:8px;padding:7px 11px;margin-top:6px}
  .lesson-body .block .zachem b{color:#0d3a6b}
  /* разделители частей + варианты выбора + список ссылок + альтернатива */
  .lesson-body .part{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--golddark);margin:30px 0 -4px;padding-top:10px;border-top:2px solid #f0dca0}
  .lesson-body .opt{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin:12px 0}
  .lesson-body .opt .on{font-weight:800;font-size:16px}
  .lesson-body .opt .od{font-size:15px;color:#2a2620;margin:6px 0}
  .lesson-body .opt.best{background:linear-gradient(110deg,#fff8e8,#fffdf6);border-color:#f0dca0}
  .lesson-body .opt .badge{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#1f7a3d;background:#e4f6ea;border:1px solid #b6e3c4;border-radius:999px;padding:2px 9px;margin-left:8px;vertical-align:middle}
  .lesson-body .links{list-style:none;padding-left:0;margin:10px 0}
  .lesson-body .links li{padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin:7px 0;background:#fffdf8;font-size:14.5px}
  .lesson-body .links li b{display:block;margin-bottom:2px}
  .lesson-body .alt{border:1.5px dashed #c5dcf5;border-radius:14px;padding:12px 16px;margin:12px 0;background:#f6faff}
  .lesson-body .alt b{color:#0d3a6b}
  @media(max-width:640px){.lesson-body .goal{grid-template-columns:1fr}}
  /* видео */
  .video{position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:#000;margin:8px 0 18px}
  .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .video-empty{display:flex;align-items:center;justify-content:center;color:#cdc7b9;font-size:15px;background:repeating-linear-gradient(135deg,#161310,#161310 12px,#1c1810 12px,#1c1810 24px)}
  /* блок команды с копированием */
  .cmd-block{position:relative;margin:12px 0}
  .cmd-block pre{background:#161310;color:#f3e9cf;border-radius:12px;padding:16px 16px 16px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:14px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  .copybtn{position:absolute;top:10px;right:10px;background:linear-gradient(110deg,var(--gold2),var(--gold));color:#141414;border:none;border-radius:8px;padding:6px 12px;font-weight:800;font-size:12.5px;cursor:pointer}
  .copybtn.done{background:var(--green);color:#fff}
  /* домашка */
  .hw{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:18px;margin:22px 0}
  .hw h3{margin-bottom:8px}
  .hw input[type=file]{display:block;margin:10px 0;font-size:14px}
  /* подвал действий */
  .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:24px 0 10px}
  .back{color:var(--golddark);font-weight:700;text-decoration:none}
  /* навигация между уроками ← / → */
  .lesson-nav{display:flex;justify-content:space-between;gap:12px;margin:6px 0 26px}
  .lesson-nav a{flex:1;display:flex;align-items:center;gap:10px;text-decoration:none;border:1.5px solid var(--line);border-radius:12px;padding:12px 16px;color:#2a2620;background:#fffdf8;transition:border-color .15s}
  .lesson-nav a:hover{border-color:var(--gold)}
  .lesson-nav a.next{justify-content:flex-end;text-align:right}
  .lesson-nav a .dir{color:var(--golddark);font-size:20px;font-weight:800;flex:0 0 auto}
  .lesson-nav a .lab{font-size:11px;color:#8a8272;font-weight:800;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:1px}
  .lesson-nav a .ttl{font-size:14.5px;font-weight:700}
  .lesson-nav .spacer{flex:1}
  @media(max-width:560px){.lesson-nav a .ttl{display:none}}
  /* вкладки под видео: Конспект · Таймкоды · Промпты · Ссылки · Транскрипт */
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:2px solid var(--line);margin:10px 0 0}
  .tabs button{background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;padding:10px 14px;font-weight:800;font-size:15px;color:#8a8272;cursor:pointer;border-radius:8px 8px 0 0}
  .tabs button:hover{color:var(--golddark);background:#fffdf6}
  .tabs button.active{color:var(--golddark);border-bottom-color:var(--gold)}
  .pane{display:none}
  .pane.active{display:block}
  .pane-hint{font-size:13.5px;color:#8a8577;margin:14px 2px 6px}
  .pane-title{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--golddark);margin:18px 0 4px}
  .tcrow{display:flex;gap:12px;align-items:baseline;padding:10px;border-bottom:1px solid var(--line);border-radius:8px;cursor:pointer;transition:background .12s}
  .tcrow:last-child{border-bottom:none}
  .tcrow:hover{background:var(--soft)}
  .tcrow .tct{flex:0 0 auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;font-weight:700;color:#9c7a00;background:#fff3d4;border:1px solid #f0dca0;border-radius:6px;padding:2px 8px;min-width:62px;text-align:center}
  .tcrow .tcs{font-size:15.5px;color:#2a2620;line-height:1.45}
  .tcrow .tcgo{margin-left:auto;color:#cbbf9c;font-weight:800}
  .tcrow:hover .tcgo{color:var(--golddark)}
  .trrow{display:flex;gap:12px;align-items:baseline;padding:10px 10px 14px}
  .trrow .tct{flex:0 0 auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;font-weight:700;color:#9c7a00;background:#fff3d4;border:1px solid #f0dca0;border-radius:6px;padding:2px 8px;min-width:66px;text-align:center;cursor:pointer}
  .trrow .trs{font-size:15.5px;color:#3a3833;line-height:1.6}
  .lcard{display:flex;gap:13px;align-items:flex-start;border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;margin:9px 0;background:#fffdf8}
  .lcard .ico{flex:0 0 auto;width:38px;height:38px;border-radius:10px;background:linear-gradient(110deg,var(--gold2),var(--gold));color:#141414;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
  .lcard .lt{font-weight:700;font-size:15.5px;color:#2a2620;word-break:break-word}
  .lcard .ld{font-size:13px;color:#8a8272;font-family:ui-monospace,Menlo,Consolas,monospace;margin-top:2px}
  .lcard .lgo{margin-left:auto;flex:0 0 auto;align-self:center;text-decoration:none;font-weight:800;font-size:13px;color:#141414;background:linear-gradient(110deg,var(--gold2),var(--gold));border-radius:9px;padding:8px 13px;white-space:nowrap}
  .pnum{display:inline-block;min-width:24px;height:24px;line-height:24px;text-align:center;border-radius:7px;background:linear-gradient(110deg,var(--gold2),var(--gold));color:#141414;font-weight:800;font-size:13px;margin-right:8px}
  .pblock{border:1.5px dashed #c5a23a;border-radius:14px;padding:12px 16px;margin:14px 0;background:#fffdf6}
  .pblock .ph{font-weight:800;color:var(--golddark);margin-bottom:4px}
  /* тест после урока */
  .qblock{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin:14px 0;background:#fffdf8}
  .qh{font-weight:800;font-size:16px;color:#2a2620;display:flex;align-items:baseline;line-height:1.45}
  .qopts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .qopt{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:11px 14px;font-size:15.5px;color:#2a2620;cursor:pointer;font-family:inherit;line-height:1.45;transition:border-color .12s,background .12s}
  .qopt:hover:not(:disabled){border-color:var(--gold);background:#fffdf6}
  .qopt.sel{border-color:var(--gold);background:#fff8e4;font-weight:700}
  .qopt.good{border-color:#2e9e54;background:#eaf7ee;font-weight:700;color:#1d6b39}
  .qopt.bad{border-color:#c0392b;background:#fbeceb;color:#8f2b20}
  .qopt:disabled{cursor:default}
  .qwhy{display:none}
  .qwhy.show{display:block;margin-top:11px;font-size:15px;line-height:1.55;border-radius:10px;padding:10px 13px}
  .qwhy.okw{background:#eaf7ee;border:1px solid #bfe3cb;color:#1d6b39}
  .qwhy.badw{background:#fff8e8;border:1px solid #f0dca0;color:#7a5a12}
  .qjump{cursor:pointer;font-weight:800;color:#9c7a00;white-space:nowrap}
  .qjump:hover{text-decoration:underline}
  .qfoot{display:flex;align-items:center;gap:14px;margin:18px 0 6px;flex-wrap:wrap}
  .qcheck{background:linear-gradient(110deg,var(--gold2),var(--gold));color:#141414;border:none;border-radius:11px;padding:12px 22px;font-weight:800;font-size:15.5px;cursor:pointer;font-family:inherit}
  .qscore{font-weight:800;font-size:15.5px;color:#2a2620}
  /* «Если застрял» */
  .hitem{border:1.5px solid var(--line);border-radius:12px;margin:9px 0;overflow:hidden;background:#fffdf8}
  .hq{width:100%;text-align:left;background:none;border:none;padding:13px 15px;font-weight:800;font-size:15.5px;color:#2a2620;cursor:pointer;display:flex;align-items:baseline;gap:9px;font-family:inherit;line-height:1.4}
  .hq:hover{background:#fffdf6}
  .harrow{color:var(--gold);font-weight:800;transition:transform .15s;display:inline-block}
  .hq.open .harrow{transform:rotate(90deg)}
  .ha{display:none;padding:0 15px 14px 33px;font-size:15px;line-height:1.6;color:#3a3833}
  .ha.show{display:block}
  @media(max-width:560px){.tabs button{padding:9px 10px;font-size:14px}.lcard .lgo{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="row">
    <span class="brand"><a href="/lessons.html" style="color:#fff;text-decoration:none">← Уроки</a></span>
    <span>
      <span class="who" id="who"></span>
      <button id="logout">Выйти</button>
    </span>
  </div>
</div>

<main class="wrap">
  <div id="content"><div class="center">Загружаю урок…</div></div>
</main>

<footer>Интенсив «AI-команда на Claude» · кабинет</footer>

<script type="module">
import { supabase } from '/js/supabase-client.js'
import { requireAuth, signOut, currentUser } from '/js/auth.js'

document.getElementById('logout').onclick = () => signOut()

const params = new URLSearchParams(location.search)
const lessonId = parseInt(params.get('id'), 10)

const session = await requireAuth()
let user = null
if(session){
  user = await currentUser()
  document.getElementById('who').textContent = user?.email || ''
  loadLesson()
}

async function loadLesson(){
  const box = document.getElementById('content')
  if(!lessonId && lessonId !== 0){ box.innerHTML = '<div class="locked">Урок не указан.</div>'; return }

  const { data: lesson, error } = await supabase
    .from('lessons').select('id,title,day,body_html,video_url,unlock_at').eq('id', lessonId).single()

  if(error || !lesson){
    box.innerHTML = `<div class="locked"><b>Урок недоступен.</b><br>Возможно, доступ ещё не открыт. Вернись к <a href="/lessons.html">списку уроков</a>.</div>`
    return
  }

  // админ (Mrs) обходит замок для предпросмотра; ученики — нет
  const { data: meProf } = await supabase.from('profiles').select('is_admin').eq('id', user.id).maybeSingle()
  const isAdmin = !!(meProf && meProf.is_admin)

  // урок ещё закрыт по дате — не показываем содержимое
  if(!isAdmin && lesson.unlock_at && new Date(lesson.unlock_at) > new Date()){
    const M = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря']
    const d = new Date(lesson.unlock_at)
    box.innerHTML = `<div class="locked"><b>🔒 Урок ещё закрыт.</b><br>Откроется ${d.getDate()} ${M[d.getMonth()]}. Пока доступно предобучение — вернись к <a href="/lessons.html">списку уроков</a>.</div>`
    return
  }

  const { data: prog } = await supabase
    .from('progress').select('done').eq('lesson_id', lessonId).maybeSingle()
  const done = !!(prog && prog.done)

  // соседние уроки для стрелок ← / → (порядок как в списке: day, затем sort)
  const { data: allLessons } = await supabase
    .from('lessons').select('id,title').order('day', { ascending: true }).order('sort', { ascending: true })
  let prev = null, next = null
  if(Array.isArray(allLessons)){
    const idx = allLessons.findIndex(l => l.id === lessonId)
    if(idx > 0) prev = allLessons[idx - 1]
    if(idx >= 0 && idx < allLessons.length - 1) next = allLessons[idx + 1]
  }
  const navHtml = `
    <div class="lesson-nav">
      ${prev ? `<a class="prev" href="/lesson.html?id=${prev.id}"><span class="dir">←</span><span><span class="lab">Предыдущий</span><span class="ttl">${prev.title}</span></span></a>` : `<span class="spacer"></span>`}
      ${next ? `<a class="next" href="/lesson.html?id=${next.id}"><span><span class="lab">Следующий</span><span class="ttl">${next.title}</span></span><span class="dir">→</span></a>` : `<span class="spacer"></span>`}
    </div>`

  // разбираем body_html: вытаскиваем данные вкладок (тайм-коды + транскрипт), остальное = конспект
  const parsed = parseBody(lesson.body_html || '')

  box.innerHTML = `
    <h1 style="margin:20px 0 6px">${lesson.title}</h1>
    ${navHtml}
    ${lesson.video_url ? `<div class="video" id="videoBox"><div id="kplayer"></div></div>` : ``}
    <div id="tabsHost"></div>
    <div class="actions">
      <button class="btn" id="doneBtn" style="max-width:260px">${done ? 'Пройдено ✓' : 'Отметить пройденным'}</button>
      <a class="back" href="/lessons.html">← ко всем урокам</a>
    </div>
    ${navHtml}
  `

  mountVideo(lesson.video_url)
  renderTabs(parsed)
  enhanceCopy()
  wireDone(done)
}

// ---------- вкладки ----------

// Достаём из body_html JSON-блок вкладок (тайм-коды + транскрипт) и убираем старую плашку тайм-кодов.
function parseBody(html){
  const holder = document.createElement('div')
  holder.innerHTML = html
  let data = { tc: [], tr: [], quiz: [] }
  const dataEl = holder.querySelector('#lesson-tabs')
  if(dataEl){
    try { data = JSON.parse(dataEl.textContent) } catch(e) { console.warn('lesson-tabs JSON', e) }
    dataEl.remove()
    // старая сворачивающаяся плашка тайм-кодов больше не нужна — она стала вкладкой
    holder.querySelectorAll('.tcx-box').forEach(el => el.remove())
  }
  return { body: holder, tc: data.tc || [], tr: data.tr || [], quiz: data.quiz || [] }
}

function renderTabs({ body, tc, tr, quiz }){
  const host = document.getElementById('tabsHost')

  // промпты и ссылки берём прямо из конспекта — они там уже есть
  const prompts = [...body.querySelectorAll('.prompt')].map(p => ({
    title: (p.querySelector('.h')?.textContent || 'Промпт').trim(),
    text: (p.querySelector('pre')?.textContent || '').trim()
  })).filter(p => p.text)

  const seen = new Set()
  const links = [...body.querySelectorAll('a[href^="http"]')].map(a => {
    const href = a.getAttribute('href')
    let host2 = ''
    try { host2 = new URL(href).hostname.replace(/^www\./, '') } catch(e) { return null }
    if(seen.has(href)) return null
    seen.add(href)
    const label = (a.textContent || '').trim()
    return { href, host: host2, title: label && label.length > 2 ? label : host2 }
  }).filter(Boolean)

  const panes = []
  panes.push({ key: 'konspekt', label: 'Конспект', render: el => {
    const b = document.createElement('div'); b.className = 'lesson-body'; b.innerHTML = body.innerHTML; el.appendChild(b)
  }})

  if(tc.length) panes.push({ key: 'tc', label: 'Таймкоды', render: el => {
    el.innerHTML = `<div class="pane-hint">Нажми на момент — видео перемотается туда.</div>` +
      tc.map(([sec, t, s]) => `<div class="tcrow" data-sec="${sec}"><span class="tct">${t}</span><span class="tcs">${esc(s)}</span><span class="tcgo">▸</span></div>`).join('')
  }})

  if(prompts.length) panes.push({ key: 'prompts', label: 'Промпты', render: el => {
    el.innerHTML = `<div class="pane-title">&gt; промпты урока · ${prompts.length}</div>` +
      prompts.map((p, i) => `<div class="pblock"><div class="ph"><span class="pnum">${i + 1}</span>${esc(p.title)}</div><pre>${esc(p.text)}</pre></div>`).join('')
  }})

  if(links.length) panes.push({ key: 'links', label: 'Ссылки', render: el => {
    el.innerHTML = `<div class="pane-title">&gt; главные ссылки урока · ${links.length}</div>` +
      links.map(l => `<div class="lcard"><div class="ico">${esc(l.host.slice(0, 1).toUpperCase())}</div><div><div class="lt">${esc(l.title)}</div><div class="ld">${esc(l.host)}</div></div><a class="lgo" href="${esc(l.href)}" target="_blank" rel="noopener">Открыть →</a></div>`).join('')
  }})

  if(tr.length) panes.push({ key: 'tr', label: 'Транскрипт', render: el => {
    el.innerHTML = `<div class="pane-hint">Полный текст видео. Нажми на время — видео перемотается туда.</div>` +
      tr.map(([sec, t, s]) => `<div class="trrow"><span class="tct" data-sec="${sec}">${t}</span><span class="trs">${esc(s)}</span></div>`).join('')
  }})

  panes.push({ key: 'help', label: 'Если застрял', render: el => renderHelp(el) })

  if(quiz.length) panes.push({ key: 'quiz', label: 'Тест', render: el => renderQuiz(el, quiz) })

  // один конспект без данных вкладок — старое поведение, панель не нужна
  if(panes.length === 1){
    const only = document.createElement('div')
    panes[0].render(only)
    host.appendChild(only)
    return
  }

  const bar = document.createElement('div'); bar.className = 'tabs'
  const wrapEl = document.createElement('div')
  panes.forEach((p, i) => {
    const btn = document.createElement('button')
    btn.textContent = p.label
    btn.className = i === 0 ? 'active' : ''
    btn.onclick = () => {
      bar.querySelectorAll('button').forEach(b => b.classList.remove('active'))
      wrapEl.querySelectorAll('.pane').forEach(x => x.classList.remove('active'))
      btn.classList.add('active')
      document.getElementById('pane-' + p.key).classList.add('active')
    }
    bar.appendChild(btn)

    const pane = document.createElement('div')
    pane.className = 'pane' + (i === 0 ? ' active' : '')
    pane.id = 'pane-' + p.key
    p.render(pane)
    wrapEl.appendChild(pane)
  })
  host.appendChild(bar)
  host.appendChild(wrapEl)

  // клик по тайм-коду → перемотка видео
  host.querySelectorAll('[data-sec]').forEach(el => {
    el.onclick = () => seekTo(parseInt(el.dataset.sec, 10))
  })
}

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))
}

// ---------- «Если застрял»: частые затыки на любом уроке + фикс ----------

function renderHelp(el){
  el.innerHTML =
    `<div class="pane-hint">Самые частые затыки на этом и любом другом уроке — и что делать. Нажми на вопрос.</div>` +
    HELP_ITEMS.map((it, i) => `
      <div class="hitem">
        <button class="hq" data-i="${i}"><span class="harrow">▸</span>${esc(it.q)}</button>
        <div class="ha" id="ha-${i}">${it.a}</div>
      </div>`).join('')
  el.querySelectorAll('.hq').forEach(b => {
    b.onclick = () => {
      const a = el.querySelector('#ha-' + b.dataset.i)
      const open = a.classList.toggle('show')
      b.classList.toggle('open', open)
    }
  })
}

// ---------- тест после урока: выбрал ответы → проверил → разбор ошибок ----------
function renderQuiz(el, quiz){
  const answers = new Array(quiz.length).fill(null)
  let checked = false

  el.innerHTML =
    `<div class="pane-hint">Короткая проверка: ${quiz.length} вопрос(ов). Отвечай по памяти — где ошибся, покажу разбор и момент в видео.</div>` +
    quiz.map((q, qi) => `
      <div class="qblock" data-q="${qi}">
        <div class="qh"><span class="pnum">${qi + 1}</span>${esc(q.q)}</div>
        <div class="qopts">${q.o.map((o, oi) =>
          `<button class="qopt" data-q="${qi}" data-o="${oi}">${esc(o)}</button>`).join('')}</div>
        <div class="qwhy" id="why-${qi}"></div>
      </div>`).join('') +
    `<div class="qfoot">
       <button class="qcheck" id="qcheck">Проверить</button>
       <span class="qscore" id="qscore"></span>
     </div>`

  el.querySelectorAll('.qopt').forEach(b => {
    b.onclick = () => {
      if(checked) return
      const qi = +b.dataset.q
      answers[qi] = +b.dataset.o
      el.querySelectorAll(`.qopt[data-q="${qi}"]`).forEach(x => x.classList.remove('sel'))
      b.classList.add('sel')
    }
  })

  const btn = el.querySelector('#qcheck')
  btn.onclick = () => {
    if(checked){    // второй клик — пройти заново
      renderQuiz(el, quiz)
      return
    }
    const empty = answers.findIndex(a => a === null)
    if(empty >= 0){
      el.querySelector('#qscore').textContent = `Ответь на вопрос ${empty + 1} — он ещё пустой.`
      return
    }
    checked = true
    let right = 0
    quiz.forEach((q, qi) => {
      const ok = answers[qi] === q.c
      if(ok) right++
      el.querySelectorAll(`.qopt[data-q="${qi}"]`).forEach(x => {
        const oi = +x.dataset.o
        if(oi === q.c) x.classList.add('good')
        else if(oi === answers[qi]) x.classList.add('bad')
        x.disabled = true
      })
      const why = el.querySelector(`#why-${qi}`)
      const jump = (q.sec != null)
        ? ` <span class="qjump" data-sec="${q.sec}">▸ смотреть момент</span>` : ''
      why.className = 'qwhy show ' + (ok ? 'okw' : 'badw')
      why.innerHTML = `<b>${ok ? 'Верно.' : 'Мимо.'}</b> ${esc(q.why || '')}${jump}`
    })
    el.querySelector('#qscore').textContent =
      `${right} из ${quiz.length}` + (right === quiz.length ? ' — урок усвоен.' : ' — перечитай разбор ниже.')
    btn.textContent = 'Пройти заново'
    el.querySelectorAll('.qjump').forEach(j => { j.onclick = () => seekTo(parseInt(j.dataset.sec, 10)) })
  }
}

// ---------- видео (Kinescope IFrame Player API — нужен для перемотки по тайм-кодам) ----------
let kPlayer = null

function mountVideo(videoUrl){
  if(!videoUrl) return
  window.__kUrl = videoUrl.replace('/embed/', '/')   // фабрике плеера нужен обычный URL, не /embed/
  const fallback = setTimeout(() => { if(!kPlayer) plainIframe(videoUrl) }, 6000)
  window.onKinescopeIframeAPIReady = (factory) => {
    factory.create('kplayer', { url: window.__kUrl, size: { width: '100%', height: '100%' } })
      .then(p => { kPlayer = p; clearTimeout(fallback) })
      .catch(() => { clearTimeout(fallback); plainIframe(videoUrl) })
  }
  const s = document.createElement('script')
  s.src = 'https://player.kinescope.io/latest/iframe.player.js'
  s.onerror = () => { clearTimeout(fallback); plainIframe(videoUrl) }
  document.head.appendChild(s)
}

// если API не загрузился — обычный iframe (без перемотки, но видео работает)
function plainIframe(videoUrl){
  const box = document.getElementById('videoBox')
  if(box) box.innerHTML = `<iframe src="${videoUrl}" allow="autoplay; fullscreen" allowfullscreen></iframe>`
}

function seekTo(sec){
  if(isNaN(sec)) return
  document.getElementById('videoBox')?.scrollIntoView({ behavior: 'smooth', block: 'start' })
  if(kPlayer){
    kPlayer.seekTo(sec).then(() => kPlayer.play()).catch(() => {})
  }
}

// Кнопка «Копировать» на каждый блок команды (<pre> внутри урока).
function enhanceCopy(){
  document.querySelectorAll('.lesson-body pre, #pane-prompts pre').forEach(pre => {
    const wrap = document.createElement('div')
    wrap.className = 'cmd-block'
    pre.parentNode.insertBefore(wrap, pre)
    wrap.appendChild(pre)
    const btn = document.createElement('button')
    btn.className = 'copybtn'
    btn.textContent = 'Копировать'
    btn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(pre.innerText.trim())
        btn.textContent = 'Скопировано ✓'; btn.classList.add('done')
        setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('done') }, 1500)
      } catch { btn.textContent = 'Выдели и скопируй' }
    }
    wrap.appendChild(btn)
  })
}

function wireDone(done){
  const btn = document.getElementById('doneBtn')
  let isDone = done
  btn.onclick = async () => {
    isDone = !isDone
    btn.disabled = true
    const { error } = await supabase.from('progress')
      .upsert({ user_id: user.id, lesson_id: lessonId, done: isDone, updated_at: new Date().toISOString() })
    btn.disabled = false
    if(error){ btn.textContent = 'Ошибка, попробуй ещё'; return }
    btn.textContent = isDone ? 'Пройдено ✓' : 'Отметить пройденным'
  }
}
